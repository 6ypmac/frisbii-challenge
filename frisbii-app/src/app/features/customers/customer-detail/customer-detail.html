<h2>Customer {{ customerHandle() }}</h2>

@if (store.loading()) {
  <p>Loading invoices...</p>
} @else {
  @if (store.error()) {
    <p>{{ store.error() }}</p>
  } @else {
    <ul>
      @for (invoice of store.invoices(); track invoice.handle) {
        <li>{{ invoice.handle }} — {{ invoice.amount }}</li>
      }
    </ul>
  }
}
